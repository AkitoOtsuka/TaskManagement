spring.application.name=todoboard

# --- PostgreSQL への接続設定（Docker で起動した DB に繋ぐ） ---
spring.datasource.url=jdbc:postgresql://localhost:5432/todoboard
spring.datasource.username=todoboard
spring.datasource.password=todoboard

# Entity の定義に合わせてテーブルを自動で作成/更新する（学習用に便利）
spring.jpa.hibernate.ddl-auto=update
# 実行される SQL をログに出して、何が起きているか見えるようにする
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
